<div class="transfer-container">
  <h2>Nova Transferência 💸</h2>
  <p class="subtitle">Transfira saldo entre benefícios de forma segura.</p>

  <div class="form-card">
    <div class="form-group">
      <label for="idOrigem">ID do Benefício de Origem</label>
      <input type="number" id="idOrigem" [(ngModel)]="idOrigem" placeholder="Ex: 1">
    </div>

    <div class="form-group">
      <label for="idDestino">ID do Benefício de Destino</label>
      <input type="number" id="idDestino" [(ngModel)]="idDestino" placeholder="Ex: 2">
    </div>

    <div class="form-group">
      <label for="valor">Valor a Transferir (R$)</label>
      <input type="number" id="valor" [(ngModel)]="valor" placeholder="0.00">
    </div>

    <div *ngIf="mensagem" [ngClass]="{'msg-sucesso': tipoMensagem === 'sucesso', 'msg-erro': tipoMensagem === 'erro'}">
      {{ mensagem }}
    </div>

    <div class="actions">
      <button class="btn-cancelar" routerLink="/beneficios" [disabled]="processando">Cancelar</button>
      <button class="btn-confirmar" (click)="executarTransferencia()" [disabled]="processando">
        {{ processando ? 'A processar...' : 'Confirmar Transferência' }}
      </button>
    </div>
  </div>
</div>
