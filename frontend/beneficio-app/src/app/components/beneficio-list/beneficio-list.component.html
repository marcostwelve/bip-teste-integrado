<div style="padding: 20px; font-family: sans-serif;">
  <h1>Gerenciador de Benefícios 💰</h1>

  <table border="1" style="width: 100%; text-align: left; border-collapse: collapse;">
    <thead style="background-color: #f2f2f2;">
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Saldo (Valor)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of beneficios">
        <td>{{ b.id }}</td>
        <td>{{ b.nome }}</td>
        <td>{{ b.descricao }}</td>
        <td>{{ b.valor | currency:'BRL' }}</td>
        <td>{{ b.ativo ? 'Ativo' : 'Inativo' }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="beneficios.length === 0">Nenhum benefício encontrado. O banco está vazio ou o backend está desligado.</p>
</div>
